name: Auto Version & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-release]') && !contains(github.event.head_commit.message, 'chore:')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check if version tag already exists
        id: check_tag
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if git tag | grep -q "^v${CURRENT}$"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT

      - name: Bump patch version if tag exists
        if: steps.check_tag.outputs.tag_exists == 'true'
        run: |
          npm version patch --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          sed -i "s/\*\*v[0-9]*\.[0-9]*\.[0-9]*\*\*/\*\*v${NEW}\*\*/g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json README.md
          git commit -m "chore: bump version to v${NEW} [skip-release]"
          git push

      - name: Create release tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! git tag | grep -q "^v${VERSION}$"; then
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
