name: Build Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate runtime config
        shell: pwsh
        run: |
          @"
          window.WT_CONFIG = {
            storage: 'supabase',
            supabaseSchemaVersion: 'v2',
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          "@ | Set-Content -Encoding utf8 config.js

      - name: Build NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkTracker-Windows-Installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
