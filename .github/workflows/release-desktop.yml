name: Build Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate runtime config
        shell: pwsh
        run: |
          @"
          window.WT_CONFIG = {
            storage: 'supabase',
            supabaseSchemaVersion: 'v2',
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}',
            storageProvider: 'google_drive'
          };
          "@ | Set-Content -Encoding utf8 config.js

      - name: Verify packaged version and required assets
        shell: pwsh
        run: |
          npm run pack
          $asarList = npx --yes asar list release/win-unpacked/resources/app.asar
          if (-not ($asarList -match 'splash-sphere\.js')) {
            throw 'splash-sphere.js missing from app.asar'
          }
          if (-not ($asarList -match 'node_modules[\\/]electron-updater')) {
            throw 'electron-updater missing from app.asar'
          }
          $tmp = Join-Path $env:RUNNER_TEMP 'asar-check'
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          npx --yes asar extract release/win-unpacked/resources/app.asar $tmp
          $pkg = Get-Content (Join-Path $tmp 'package.json') -Raw | ConvertFrom-Json
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($pkg.version -ne $tag) {
            throw "Version mismatch: asar=$($pkg.version) tag=$tag"
          }

      - name: Build NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkTracker-Windows-Installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
