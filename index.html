<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Orbitask</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3.2.1">
  <!-- React Flow (xyflow) island styles for the project task map -->
  <link rel="stylesheet" href="vendor/orbiflow/orbiflow.css?v=3.2.1">
  <!-- tldraw collaborative canvas island styles -->
  <link rel="stylesheet" href="vendor/orbicanvas/orbicanvas.css?v=3.2.1">
  <!-- Local Copilot styles (Ollama, proposal-only writes) -->
  <link rel="stylesheet" href="copilot.css?v=3.2.1">
  <!-- SortableJS for smooth task drag-and-drop -->
  <script src="vendor/sortablejs/Sortable.min.js?v=1.15.7"></script>
  <!-- Quill rich-text editor island styles -->
  <link rel="stylesheet" href="vendor/orbinotes/orbinotes.css?v=3.2.1">
  <!-- jsPDF for PDF report generation -->
  <script src="vendor/jspdf/jspdf.umd.min.js?v=4.2.1"></script>
  <script src="vendor/jspdf-autotable/jspdf.plugin.autotable.min.js?v=5.0.8"></script>
  <!-- D3.js for interactive team activity map -->
  <script src="vendor/d3/d3.min.js?v=7.9.0"></script>
  <!-- Floating UI for selected icon tooltips -->
  <script src="vendor/floating-ui/floating-ui.core.umd.min.js?v=1.7.5"></script>
  <script src="vendor/floating-ui/floating-ui.dom.umd.min.js?v=1.7.6"></script>
</head>
<body>

  <!-- Loading Splash — Orbitask Black Edition v3 -->
  <div id="splash">
    <canvas id="splash-sphere" class="splash-sphere-canvas" aria-hidden="true"></canvas>
    <div class="splash-inner">
      <p class="splash-brand">ORBITASK</p>
      <p class="splash-edition">Black Edition <span class="splash-edition-dot">·</span> v3</p>
      <div class="splash-loader-bar"><div class="splash-loader-fill"></div></div>
      <p class="splash-status" id="splash-status">Loading local database…</p>
      <p class="splash-version" id="splash-app-version">v3.2.1</p>
    </div>
  </div>

  <!-- Auth Screen (Login / First-time Setup) — hidden until applyRoute() shows it -->
  <div id="auth-screen" class="auth-screen" style="display:none">
    <div id="auth-content" class="auth-card">
      <p class="auth-loading">Signing in…</p>
    </div>
  </div>

  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-btn" id="menu-toggle" aria-label="Toggle menu" style="display:none">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
  </button>
  <div class="sidebar-backdrop hidden" id="sidebar-backdrop" aria-hidden="true"></div>

  <!-- Main App (hidden until logged in) -->
  <div id="app" class="app-layout" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand" title="WorkTracker">
        <div class="brand-icon-svg brand-icon-bw">
          <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="14" y="28" width="52" height="11" rx="5.5" fill="#fff"/>
            <path d="M74 30 L80 36 L90 23" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="14" y="46" width="40" height="11" rx="5.5" fill="#fff"/>
            <rect x="14" y="64" width="26" height="11" rx="5.5" fill="#fff"/>
          </svg>
        </div>
        <span class="brand-name">Orbitask</span>
      </div>

      <div class="sidebar-clock" id="sidebar-clock" aria-live="off" aria-label="Current time">
        <svg class="clock-face" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="clock-face-ring" cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="3.5"/>
          <circle id="sc-work-arc" cx="60" cy="60" r="50" fill="none" stroke="currentColor" stroke-width="3.5" stroke-dasharray="314.16" stroke-dashoffset="314.16" transform="rotate(-90 60 60)" opacity="0.18"/>
          <g class="clock-ticks"></g>
          <line class="clock-hand clock-hour" x1="60" y1="60" x2="60" y2="34" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line class="clock-hand clock-minute" x1="60" y1="60" x2="60" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line class="clock-hand clock-second" x1="60" y1="60" x2="60" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
          <circle cx="60" cy="60" r="2.5" fill="currentColor"/>
        </svg>
        <div class="clock-digital">
          <span class="sc-time" id="sc-time">00:00:00</span>
          <span class="sc-date" id="sc-date">Mon 01 Jan</span>
          <span class="sc-workday" id="sc-workday"></span>
        </div>
        <div class="clock-progress">
          <div class="clock-bar-row"><span class="clock-bar-label">Year</span><div class="clock-bar"><div class="clock-bar-fill clock-bar-fill--year" id="sc-year-fill"></div></div><b class="clock-bar-pct" id="sc-year-pct">0%</b></div>
          <div class="clock-bar-row"><span class="clock-bar-label">Month</span><div class="clock-bar"><div class="clock-bar-fill clock-bar-fill--month" id="sc-month-fill"></div></div><b class="clock-bar-pct" id="sc-month-pct">0%</b></div>
          <div class="clock-bar-row"><span class="clock-bar-label">Week</span><div class="clock-bar"><div class="clock-bar-fill clock-bar-fill--week" id="sc-week-fill"></div></div><b class="clock-bar-pct" id="sc-week-pct">0%</b></div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#/projects" class="nav-item active" data-nav="projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
          <span>Projects</span>
        </a>
        <a href="#/tasks" class="nav-item" data-nav="tasks">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
          <span>Tasks</span>
        </a>
        <a href="#/users" class="nav-item" data-nav="users">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Team</span>
        </a>
        <a href="#/calendar" class="nav-item" data-nav="calendar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Calendar</span>
        </a>
        <div class="sidebar-nav-label">Other</div>
        <a href="#/support" class="nav-item" data-nav="support">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Support</span>
        </a>
        <a href="#/diagnostics" class="nav-item" data-nav="diagnostics">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0Z"/></svg>
          <span>Diagnostics</span>
        </a>
        <a href="#/about" class="nav-item" data-nav="about">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <span>About</span>
        </a>
        <a href="#/dashboard" class="nav-item" data-nav="dashboard" id="nav-dashboard" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#/reports" class="nav-item" data-nav="reports" id="nav-reports" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15v-4"/><path d="M12 15V8"/><path d="M17 15v-7"/></svg>
          <span>Reports</span>
        </a>
        <a href="#/admin" class="nav-item" data-nav="admin" id="nav-admin" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
          <span>Admin</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-actions" id="sidebar-footer-actions"></div>
        <div class="sidebar-footer-user sidebar-user-clickable" id="sidebar-footer-user" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false"></div>
        <div id="user-menu" class="user-menu-popup hidden" role="menu"></div>
      </div>
    </aside>

    <div class="app-body">
      <div class="app-main-column">
        <main class="main-content" id="main-content">
          <div id="content" class="content-area"></div>
        </main>
      </div>
      <div id="project-panel-backdrop" class="project-panel-backdrop hidden" aria-hidden="true"></div>
      <aside id="document-panel" class="document-panel hidden" aria-label="Project documents"></aside>
      <div id="ranking-panel-backdrop" class="ranking-panel-backdrop hidden" aria-hidden="true"></div>
      <aside id="ranking-panel" class="ranking-panel hidden" aria-label="How ranking works"></aside>
    </div>

    <!-- Mobile Bottom Navigation (visible only on small screens) -->
    <nav class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Main navigation">
      <a href="#/" class="nav-item mobile-nav-item" data-nav="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="#/projects" class="nav-item mobile-nav-item" data-nav="projects">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span>Projects</span>
      </a>
      <a href="#/tasks" class="nav-item mobile-nav-item" data-nav="tasks">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
        <span>Tasks</span>
      </a>
      <a href="#/notifications" class="nav-item mobile-nav-item mobile-nav-notif" data-nav="notifications">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span>Alerts</span>
        <span class="nav-item-badge hidden" id="mobile-notif-badge">0</span>
      </a>
    </nav>
  </div>

  <div id="notes-backdrop" class="notes-backdrop hidden" aria-hidden="true"></div>
  <aside id="notes-panel" class="notes-panel hidden" aria-label="Personal notes">
    <div class="notes-panel-head">
      <button type="button" class="notes-panel-add-btn" data-action="add-personal-note" title="New note" aria-label="New note">+</button>
      <h2>Notes</h2>
      <button type="button" class="btn-icon" data-action="close-notes" aria-label="Close notes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="notes-panel-search-wrap">
      <input type="search" id="notes-panel-search" class="notes-panel-search" placeholder="Search…" autocomplete="off" aria-label="Search notes">
    </div>
    <div class="notes-panel-list" id="notes-panel-list"></div>
  </aside>

  <div id="chat-dock-root" class="chat-dock-root" style="display:none"></div>
  <div id="offline-sync-banner" class="offline-sync-banner hidden" aria-live="polite"></div>
  <div class="notif-panel hidden" id="notif-panel" role="dialog" aria-label="Notifications"></div>
  <div class="modal-overlay hidden" id="modal-overlay"></div>
  <div class="file-preview-overlay hidden" id="file-preview-overlay">
    <div class="file-preview-toolbar">
      <span id="file-preview-title" class="file-preview-title"></span>
      <div class="file-preview-actions">
        <span id="file-preview-count" class="file-preview-count" aria-live="polite"></span>
        <button type="button" id="file-preview-hd" class="file-preview-hd hidden" title="Load full resolution">View HD</button>
        <a id="file-preview-download" class="file-preview-download" download href="#" aria-label="Download file" title="Download file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          <span>Download</span>
        </a>
        <button type="button" class="btn-icon file-preview-close" id="file-preview-close" aria-label="Close preview">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </div>
    <button type="button" class="file-preview-nav file-preview-nav-prev hidden" id="file-preview-prev" aria-label="Previous file" title="Previous (←)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div id="file-preview-body" class="file-preview-body"></div>
    <button type="button" class="file-preview-nav file-preview-nav-next hidden" id="file-preview-next" aria-label="Next file" title="Next (→)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <div id="upload-progress-bar" class="upload-progress-bar hidden">
    <span class="upload-progress-label">Uploading…</span>
    <div class="upload-progress-track"><div class="upload-progress-fill" id="upload-progress-fill"></div></div>
  </div>
  <input type="file" id="import-input" accept=".json" hidden>
  <input type="file" id="library-file-input" hidden multiple accept="image/*,.pdf,.doc,.docx,.txt,application/pdf">

  <script>window.WT_APP_VERSION = window.WT_APP_VERSION || '3.2.1';</script>
  <script src="config.js?v=3.2.1"></script>
  <!-- Optional observability (PostHog + Sentry). No-ops unless WT_CONFIG has keys. -->
  <script src="vendor/orbiobs/orbiobs.js?v=3.2.1"></script>
  <script>
    window.OrbiObs && window.OrbiObs.init();
    window.addEventListener('error', (e) => window.OrbiObs && window.OrbiObs.captureError(e.error || e.message));
    window.addEventListener('unhandledrejection', (e) => window.OrbiObs && window.OrbiObs.captureError(e.reason));
  </script>
  <script src="vendor/dexie.min.js?v=3.2.1"></script>
  <script src="vendor/supabase.min.js?v=3.2.1"></script>
  <script src="db.js?v=3.2.1"></script>
  <script src="db-supabase.js?v=3.2.1"></script>
  <script src="sync.js?v=3.2.1"></script>
  <script src="sync-v3.js?v=3.2.1"></script>
  <script src="realtime-sync.js?v=3.2.1"></script>
  <script src="notification-sounds.js?v=3.2.1"></script>
  <script src="db-bridge.js?v=3.2.1"></script>
  <script src="splash-sphere.js?v=3.2.1"></script>
  <script src="app.js?v=3.2.1"></script>
  <script src="notes.js?v=3.2.1"></script>
  <script src="chat.js?v=3.2.1"></script>
  <script src="canvas.js?v=3.2.1"></script>
  <script src="reports.js?v=3.2.1"></script>
  <!-- Hybrid Google Drive storage client (inert unless WT_CONFIG.storageProvider==='google_drive') -->
  <script src="storage-drive.js?v=3.2.1"></script>
  <script src="vendor/lucide/lucide.min.js?v=1.20.0"></script>
  <script src="ui.js?v=3.2.1"></script>
  <script src="bootstrap.js?v=3.2.1"></script>
  <script src="desktop/updates.js?v=3.2.1"></script>
  <!-- React Flow (xyflow) island — bundled React + @xyflow/react for the task map -->
  <script src="vendor/orbiflow/orbiflow.js?v=3.2.1"></script>
  <!-- Fun pack — confetti, Motion micro-animations, procedural health orb -->
  <script src="vendor/orbifun/orbifun.js?v=3.2.1"></script>
  <!-- tldraw collaborative canvas island — bundled React + tldraw + Yjs -->
  <script src="vendor/orbicanvas/orbicanvas.js?v=3.2.1"></script>
  <!-- Quill notes editor island -->
  <script src="vendor/orbinotes/orbinotes.js?v=3.2.1"></script>
  <!-- Local Copilot (Ollama, proposal-only writes). -->
  <script src="copilot.js?v=3.2.1"></script>
  <script>
    // Toggle the Copilot drawer with Ctrl+J (Cmd+J on macOS).
    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && !e.altKey && (e.key === 'j' || e.key === 'J')) {
        e.preventDefault();
        window.WTCopilot?.toggle();
      }
    });
  </script>
</body>
</html>
